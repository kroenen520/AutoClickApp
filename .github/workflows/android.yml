name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # 超时拉满
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 清理旧缓存（关键）
        run: rm -rf ~/.gradle/caches ~/.gradle/wrapper

      - name: Set JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 加执行权限
        run: chmod +x gradlew

      - name: Build Debug（国内镜像+大内存+详细日志）
        run: |
          ./gradlew assembleDebug \
            --info \
            --stacktrace \
            --no-daemon \
            -Dorg.gradle.jvmargs=-Xmx6g \
            -Dmaven.repo.local=.gradle/caches/modules-2

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk