name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # ิสะํสึถฏดฅทข

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle  # ปบดๆ Gradle าภภตฃฌด๓ท๙ฬแหู

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APKฃจด๘ฯ๊ฯธศีึพ+น๚ฤฺพตฯ๑ฃฉ
        run: |
          ./gradlew assembleDebug \
            --info \
            --stacktrace \
            --no-daemon \
            -Dmaven.repo.local=.gradle/caches/modules-2 \
            -Dorg.gradle.jvmargs=-Xmx4g

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk