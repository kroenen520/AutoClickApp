name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 헌잿앉뻠닸
        run: |
          rm -rf ~/.gradle/caches ~/.gradle/wrapper
          rm -rf .gradle

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: 퓻齡轟磵빱쏵넋뭐쉔（렝엥价）
        run: |
          ./gradlew assembleDebug \
            --info \
            --stacktrace \
            --no-daemon \
            --no-parallel \
            -Dorg.gradle.jvmargs=-Xmx8g -Xms4g \
            -Dmaven.repo.local=./.gradle/caches/modules-2

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk