name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clean Gradle caches
        run: |
          rm -rf ~/.gradle/caches ~/.gradle/wrapper
          rm -rf .gradle

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true   # 自动同意许可（官方参数）

      # 👇 关键：强制一键同意所有许可证（防止漏网）
      - name: Force accept all SDK licenses
        run: yes | sdkmanager --licenses

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug \
            --info \
            --stacktrace \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx8g -Xms4g"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7